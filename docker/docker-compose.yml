version: "3.9"

# ============================================================
# Dengue Outbreak Prediction - República Dominicana
# Docker Compose: API + Streamlit Dashboard + Scheduler
# ============================================================

services:

  # --- API FastAPI ---
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: dengue-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - API_HOST=0.0.0.0
      - API_PORT=8000
    env_file:
      - ../.env
    volumes:
      - ../data:/app/data
      - ../models:/app/models
      - ../outputs:/app/outputs
      - ../logs:/app/logs
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - dengue-network

  # --- Dashboard Streamlit ---
  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: dengue-dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - ../.env
    environment:
      - PYTHONPATH=/app
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    volumes:
      - ../data:/app/data
      - ../models:/app/models
      - ../outputs:/app/outputs
      - ../logs:/app/logs
    command: streamlit run app/streamlit_app.py --server.port=8501 --server.address=0.0.0.0
    depends_on:
      api:
        condition: service_healthy
    networks:
      - dengue-network

  # --- Scheduler automático ---
  scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: dengue-scheduler
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - PYTHONPATH=/app
    volumes:
      - ../data:/app/data
      - ../models:/app/models
      - ../outputs:/app/outputs
      - ../logs:/app/logs
    command: python scheduler/weekly_scheduler.py
    depends_on:
      - api
    networks:
      - dengue-network

  # --- Nginx reverse proxy (opcional, para producción) ---
  nginx:
    image: nginx:alpine
    container_name: dengue-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - dashboard
    networks:
      - dengue-network
    profiles:
      - production  # Solo se levanta con: docker-compose --profile production up

networks:
  dengue-network:
    driver: bridge

volumes:
  dengue-data:
    driver: local
  dengue-models:
    driver: local
  dengue-logs:
    driver: local
